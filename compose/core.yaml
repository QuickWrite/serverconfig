networks:
  net:
    external: true

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - BASE_DOMAIN=${DOMAIN}
      - OVERLEAF_SUBDOMAIN=${OVERLEAF_SUBDOMAIN}
    volumes:
      - ../config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/caddy:/data/caddy
      - /var/log/caddy:/var/log/caddy
    networks:
      - net
